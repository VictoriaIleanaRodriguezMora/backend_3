paths:
  /api/users/:
    get:
      summary: Obtiene todos los datos
      tags:
        - Users
      responses:
        "200":
          description: Los usuarios fueron obtenidos satisfactoriamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#components/schemas/User'
        "500":
          description: Error interno del servidor, usualmente generado por query defectuosa o fallo de conexion con la bdd
  /api/users/{uid}:
     get:
      summary: Obtiene un sólo usuario por id
      tags:
        - Users
      parameters:
      - name: uid
        in: path
        required: true
        description: Id del usuario que se desea solicitar
        schema:
          $type: string
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                  $ref: '#components/schemas/User'
        "500":
          description: Error interno del servidor, usualmente generado por query defectuosa o fallo de conexion con la bdd

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          description: Id autogenerado de Mongo
        first_name:
          type: string
          description: Nombre del usuario
        last_name:
          type: string
          description: Apellido del usuario
        email:
          type: string
          description: Correo del usuario, este campo es único
        password:
          type: string
          description: Contraseña hasheada del usuario
      example:
        _id: "638b8c323f3a4b3be6dc397e"
        first_name: "Mauricio"
        last_name: "Espinosa"
        email: "correo@correo.com"
        password: "$2b$10$ZjCz6oTEOFikbhKyI1Uy.ks4I0octgt3Ddzu/VWxUrsdSIDp2jka"
